<!-- Hacker's Lounge – Name → Key → Verify → Chat -->
<div class="lounge-container">
  <!-- STAGE 1: Name Entry -->
  <div id="lounge-name-entry">
    <canvas id="lounge-particles"></canvas>
    <div class="lounge-card" style="max-width: 500px; padding: 3rem;">
      <h1 class="lounge-title glitch-text" data-text="HACKER'S LOUNGE">HACKER'S LOUNGE</h1>
      <p style="margin: 2rem 0 1.5rem; color: #ccc; font-family: 'JetBrains Mono', monospace;">
        What shall we call you?
      </p>
      <input type="text" id="alias-input" placeholder="e.g. Ghost, Byte... or keep it real" 
             style="width: 80%; background: #0a0a0a; border: 1px solid #00ff9f; border-radius: 40px; padding: 10px 20px; color: #00ff9f; font-family: 'JetBrains Mono', monospace; font-size: 1rem; margin-bottom: 1.5rem;" autocomplete="off" />
      <button id="generate-key-btn" class="lounge-btn">🔑 GENERATE ACCESS KEY</button>
      <p class="error-msg" id="alias-error" style="min-height: 1.2em;"></p>
    </div>
  </div>

  <!-- STAGE 2: Key Display -->
  <div id="lounge-key" class="hidden">
    <div class="lounge-card" style="max-width: 600px; padding: 2.5rem;">
      <div class="key-screen">
        <div class="scan-line"></div>
        <p class="key-label">YOUR LOUNGE ACCESS KEY</p>
        <h2 class="key-value" id="generated-key"></h2>
        <p class="key-warning">⚠️ MEMORISE IT. YOU’LL NEED IT IN A SECOND.</p>
      </div>
      <button id="enter-lounge-btn" class="lounge-btn">🚪 ENTER LOUNGE</button>
    </div>
  </div>

  <!-- STAGE 3: Verify Key -->
  <div id="lounge-verify" class="hidden">
    <div class="lounge-card" style="max-width: 500px; padding: 2rem;">
      <h2>🔐 VERIFY YOUR KEY</h2>
      <p style="color: #aaa; margin: 1rem 0;">Welcome, <strong id="verify-alias-display"></strong></p>
      <input type="text" id="key-input" placeholder="Paste your key..." autocomplete="off" />
      <button id="verify-btn" class="lounge-btn">✅ CONFIRM</button>
      <p class="error-msg" id="verify-error"></p>
    </div>
  </div>

  <!-- STAGE 4: Chat -->
  <div id="lounge-chat" class="hidden" style="height: 100%; display: flex; flex-direction: column; width: 100%;">
    <h2 class="section-title" style="flex-shrink: 0;">💬 Hacker's Lounge – Live Hangout</h2>
    <div class="glass-card" style="flex: 1; margin: 0 auto; width: 100%; padding: 1.5rem; display: flex; flex-direction: column;">
      <div id="chat-messages" style="flex: 1; overflow-y: auto; margin-bottom: 1rem; padding: 0.5rem; background: rgba(0,0,0,0.3); border-radius: 12px; font-family: 'JetBrains Mono', monospace; font-size: 0.9rem;">
        <div id="messages-list"></div>
      </div>
      <div style="display: flex; gap: 10px; flex-shrink: 0;">
        <input type="text" id="chat-input" placeholder="Type your message..." 
               style="flex: 1; background: #0b0b18; border: 1px solid var(--neon-blue); border-radius: 40px; padding: 10px 20px; color: #fff; font-family: 'JetBrains Mono', monospace;" />
        <button id="send-btn" class="server-btn" style="background: var(--neon-blue); color: black; border: none; padding: 10px 24px; border-radius: 40px; cursor: pointer; font-weight: bold;">
          <i class="fas fa-paper-plane"></i> Send
        </button>
      </div>
      <p style="text-align: center; margin-top: 0.4rem; font-size: 0.6rem; color: #555; flex-shrink: 0; letter-spacing: 1px;">
        <span style="color: #00ff9f; text-shadow: 0 0 5px #00ff9f;">&#9664;&#9654;</span> AUTO‑PURGE : 100‑MSG ROLLING WINDOW <span style="color: #00ff9f; text-shadow: 0 0 5px #00ff9f;">&#9664;&#9654;</span>
      </p>
    </div>
  </div>
</div>

  }
  @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
  .key-label { font-family: 'Orbitron', monospace; color: #00ff9f; margin-bottom: 0.5rem; }
  .key-value {
    font-family: 'JetBrains Mono', monospace; font-size: 2.5rem; color: #00ff9f;

  .key-warning { font-size: 0.8rem; color: #ff5555; }
  #key-input {
    background: #0a0a0a; border: 1px solid #00ff9f; padding: 0.8rem 1.5rem; border-radius: 40px;
    color: #00ff9f; font-family: 'JetBrains Mono', monospace; font-size: 1rem; width: 80%;
    margin: 0.8rem 0; text-align: center;

  .error-msg { color: #ff5555; font-size: 0.8rem; margin-top: 0.5rem; }
</style>
